name: Trivy Scan 

on:
  workflow_run:
    workflows: ["Docker Build (Manual Tag)"]
    types:
        - completed

jobs:
  scan_push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory:latest ./

 
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: suwetha07/app:$IMAGE_TAG
        format: table
        severity: CRITICAL,HIGH
        exit-code: 1

   
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

   
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/inventory:latest ./