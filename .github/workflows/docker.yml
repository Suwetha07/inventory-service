name: Docker Build & Push Pipeline

on:
  push:
    branches:
      - ci-pipeline
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter Docker Image Tag"
        required: false
        default: "latest"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

   
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${{ github.event.inputs.image_tag || github.ref_name }}" >> $GITHUB_ENV

    - name: Build Docker Image
      run: docker build -t suwetha07/app:$IMAGE_TAG .

    
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  
    - name: Push Docker Image
      run: docker push suwetha07/app:$IMAGE_TAG